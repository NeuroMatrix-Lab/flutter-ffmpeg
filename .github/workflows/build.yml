name: Build Flutter App

on:
  push:
    branches: [ main, rust, dev, feature/* ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'
          cache: true
          
      - name: Setup FFmpeg
        run: choco install ffmpeg -y
        
      - name: Get dependencies
        run: flutter pub get
        
      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        
      - name: Build Windows
        run: flutter build windows --release
        
      - name: Download FFmpeg for Windows
        run: |
          $ffmpegUrl = "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip"
          $outputPath = "$env:TEMP\ffmpeg.zip"
          Write-Host "Downloading FFmpeg from $ffmpegUrl"
          curl.exe -L -o $outputPath $ffmpegUrl
          Write-Host "Extracting FFmpeg..."
          Expand-Archive -Path $outputPath -DestinationPath "$env:TEMP\ffmpeg" -Force
          # 创建 resources 目录
          New-Item -ItemType Directory -Force -Path "build\windows\x64\runner\Release\resources\windows"
          # 复制 ffmpeg.exe
          Copy-Item "$env:TEMP\ffmpeg\ffmpeg-master-latest-win64-gpl\bin\ffmpeg.exe" "build\windows\x64\runner\Release\resources\windows\ffmpeg.exe"
          Write-Host "FFmpeg copied to resources"
        
      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flutter-app-windows
          path: build/windows/x64/runner/Release/
          retention-days: 7

  build-macos:
    runs-on: macos-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'
          cache: true
          
      - name: Get dependencies
        run: flutter pub get
        
      - name: Analyze code
        run: flutter analyze --no-fatal-infos --no-fatal-warnings
        
      - name: Build macOS
        run: flutter build macos --release
        
      - name: Download FFmpeg for macOS
        run: |
          # 安装 homebrew 如果需要
          if ! command -v brew &> /dev/null; then
            /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          fi
          
          # 安装 ffmpeg
          brew install ffmpeg
          
          # 创建 macOS 资源的临时目录
          mkdir -p build/macos/Build/Products/Release/resources/macos
          
          # 复制 ffmpeg
          cp $(which ffmpeg) build/macos/Build/Products/Release/resources/macos/ffmpeg
          chmod +x build/macos/Build/Products/Release/resources/macos/ffmpeg
          echo "FFmpeg copied to resources"
        
      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: flutter-app-macos
          path: build/macos/Build/Products/Release/
          retention-days: 7
